name: post-merge-monthly-discovery

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write
  pull-requests: read

jobs:
  apply-monthly-review:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'monthly-discovery')
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: install automation dependencies
        run: python -m pip install -r automation-requirements.txt

      - name: apply selected monthly candidates
        run: python scripts/apply_top_candidates.py --input data/top10_to_add.json --readme README.md --pr-body-output data/monthly_pr_body.md --rejects data/rejected_projects.json

      - name: remove temporary monthly review files
        run: rm -f data/top10_to_add.json data/monthly_pr_body.md

      - name: regenerate projects JSON from README
        run: python scripts/generate_projects_json.py

      - name: run repository validation gate
        run: python scripts/lint_repo.py

      - name: commit monthly discovery follow-up
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: apply monthly Bangladeshi FOSS review"
          file_pattern: |
            README.md
            data/projects.json
            data/rejected_projects.json
