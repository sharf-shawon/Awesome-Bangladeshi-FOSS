name: post-merge-submission

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  close-origin-issue:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'automated-submission')
    runs-on: ubuntu-latest
    steps:
      - name: comment and close originating issue
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const match = body.match(/Closes\s+#(\d+)/i);

            if (!match) {
              core.info('No originating issue reference found in PR body.');
              return;
            }

            const issueNumber = Number(match[1]);

            try {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'closed'
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `This submission was merged in #${context.payload.pull_request.number}. The issue is now closed.`
              });
            } catch (error) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `This submission was merged in #${context.payload.pull_request.number}, but I could not close this issue automatically. Please verify the project entry was added correctly and close this issue promptly.`
              });
            }

      - name: delete merged submission branch
        if: startsWith(github.event.pull_request.head.ref, 'automation/project-submission-') && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const branchRef = `heads/${context.payload.pull_request.head.ref}`;

            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: branchRef
              });
            } catch (error) {
              if (error.status === 422 || error.status === 404) {
                core.info(`Branch ${branchRef} was already deleted or not found.`);
              } else {
                throw error;
              }
            }
