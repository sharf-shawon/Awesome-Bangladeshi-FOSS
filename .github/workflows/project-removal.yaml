name: project-removal

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-removal-pr:
    if: contains(github.event.issue.labels.*.name, 'project-removal') || startsWith(github.event.issue.title, '[Removal]') || contains(github.event.issue.body, '### Repository URL')
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: install automation dependencies
        run: python -m pip install -r automation-requirements.txt

      - name: prepare removal update from issue
        id: prepare
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          python scripts/process_project_removal.py 2>&1 | tee prepare.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          sed -n '1,120p' prepare.log >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: comment prepare validation failure
        if: steps.prepare.outputs.status != '0'
        uses: actions/github-script@v7
        env:
          FAILURE_LOG: ${{ steps.prepare.outputs.log }}
        with:
          script: |
            const log = process.env.FAILURE_LOG || 'No details were captured.';
            const body = [
              'The project removal request could not be processed because validation failed.',
              '',
              'How to fix it:',
              '- Ensure the repository URL is present and in the format https://github.com/owner/repo.',
              '- Ensure the repository is currently listed in README.',
              '- Ensure the reason for removal is included and concise.',
              '',
              'Validation details:',
              '```text',
              log,
              '```'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: stop after prepare failure
        if: steps.prepare.outputs.status != '0'
        run: exit 1

      - name: regenerate projects JSON from README
        if: steps.prepare.outputs.status == '0'
        run: python scripts/generate_projects_json.py

      - name: run repository validation gate
        id: validation
        if: steps.prepare.outputs.status == '0'
        run: |
          set +e
          python scripts/lint_repo.py 2>&1 | tee validation.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          sed -n '1,120p' validation.log >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: comment validation gate failure
        if: steps.validation.outputs.status != '' && steps.validation.outputs.status != '0'
        uses: actions/github-script@v7
        env:
          FAILURE_LOG: ${{ steps.validation.outputs.log }}
        with:
          script: |
            const log = process.env.FAILURE_LOG || 'No details were captured.';
            const body = [
              'The generated removal change failed the repository validation gate.',
              '',
              'Gate output:',
              '```text',
              log,
              '```'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: stop after validation gate failure
        if: steps.validation.outputs.status != '' && steps.validation.outputs.status != '0'
        run: exit 1

      - name: create pull request
        id: create-pr
        if: steps.validation.outputs.status == '0'
        continue-on-error: true
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: remove project from issue #${{ github.event.issue.number }}"
          title: ${{ steps.prepare.outputs.pr_title }}
          body: ${{ steps.prepare.outputs.pr_body }}
          branch: ${{ steps.prepare.outputs.branch_name }}
          base: ${{ github.event.repository.default_branch }}
          labels: |
            automated-submission
            project-removal

      - name: comment pull request creation failure
        if: steps.create-pr.conclusion == 'failure' && !steps.create-pr.outputs.pull-request-number
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = `${{ steps.prepare.outputs.branch_name }}`;
            const compareUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/compare/main...${branchName}?expand=1`;

            const body = [
              'I prepared the removal branch, but could not create a pull request automatically.',
              '',
              'Manual fallback: open a PR from this compare view:',
              compareUrl
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: stop after pull request creation failure
        if: steps.create-pr.conclusion == 'failure' && !steps.create-pr.outputs.pull-request-number
        run: exit 1

      - name: comment with pull request link
        if: steps.create-pr.outputs.pull-request-number && steps.create-pr.outputs.pull-request-operation == 'created'
        uses: actions/github-script@v7
        env:
          OWNER_VERIFIED: ${{ steps.prepare.outputs.owner_verified }}
        with:
          script: |
            const prNumber = `${{ steps.create-pr.outputs.pull-request-number }}`;
            const prUrl = `${{ steps.create-pr.outputs.pull-request-url }}`;
            const ownerVerified = (process.env.OWNER_VERIFIED || '').toLowerCase() === 'true';

            const body = ownerVerified
              ? `Thanks for the removal request. I created #${prNumber}: ${prUrl}\n\nRepository ownership was verified, so this PR will be auto-merged when required checks pass.`
              : `Thanks for the removal request. I created #${prNumber}: ${prUrl}\n\nRepository ownership could not be verified for the issue author. Maintainer review is required before merge.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: enable auto-merge for owner-verified removal
        id: enable-automerge
        if: steps.create-pr.outputs.pull-request-number && steps.prepare.outputs.owner_verified == 'true'
        continue-on-error: true
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.create-pr.outputs.pull-request-number }}
          merge-method: merge

      - name: comment auto-merge enablement failure
        if: steps.create-pr.outputs.pull-request-number && steps.prepare.outputs.owner_verified == 'true' && steps.enable-automerge.conclusion == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = `${{ steps.create-pr.outputs.pull-request-number }}`;
            const body = [
              `Pull request #${prNumber} was created successfully, but auto-merge could not be enabled.`,
              '',
              'Please check branch protection and required checks configuration for the default branch.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
