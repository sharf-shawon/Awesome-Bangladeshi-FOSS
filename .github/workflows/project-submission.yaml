name: project-submission

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-submission-pr:
    if: contains(github.event.issue.labels.*.name, 'project-submission') || startsWith(github.event.issue.title, '[Submission]') || contains(github.event.issue.body, '### Project name')
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: prepare README update from issue
        id: prepare
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set +e
          python scripts/process_project_submission.py 2>&1 | tee prepare.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          sed -n '1,120p' prepare.log >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: comment prepare validation failure
        if: steps.prepare.outputs.status != '0'
        uses: actions/github-script@v7
        env:
          FAILURE_LOG: ${{ steps.prepare.outputs.log }}
        with:
          script: |
            const log = process.env.FAILURE_LOG || 'No details were captured.';
            const body = [
              'The project submission could not be processed because validation failed.',
              '',
              'How to fix it:',
              '- Ensure all required fields are filled in the issue template.',
              '- Use a GitHub repository URL in the format https://github.com/owner/repo.',
              '- Choose one of the listed categories from the template.',
              '- Keep the description short and meaningful.',
              '- Avoid duplicate repositories that already exist in README.',
              '',
              'Validation details:',
              '```text',
              log,
              '```'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: stop after prepare failure
        if: steps.prepare.outputs.status != '0'
        run: exit 1

      - name: validate README structure and links
        id: validate
        if: steps.prepare.outputs.status == '0'
        run: |
          set +e
          python scripts/validate_readme_links.py 2>&1 | tee validate.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          sed -n '1,120p' validate.log >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: comment README validation failure
        if: steps.validate.outputs.status != '' && steps.validate.outputs.status != '0'
        uses: actions/github-script@v7
        env:
          FAILURE_LOG: ${{ steps.validate.outputs.log }}
        with:
          script: |
            const log = process.env.FAILURE_LOG || 'No details were captured.';
            const body = [
              'The generated README entry failed repository validation checks.',
              '',
              'How to fix it:',
              '- Ensure the project URL is a valid GitHub repo URL.',
              '- Make sure the repository is not already listed in README.',
              '- Keep the entry format exactly as: - [Name](https://github.com/owner/repo) - Short, meaningful description.',
              '',
              'Validation details:',
              '```text',
              log,
              '```'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: stop after README validation failure
        if: steps.validate.outputs.status != '' && steps.validate.outputs.status != '0'
        run: exit 1

      - name: lint README
        id: lint
        if: steps.validate.outputs.status == '0'
        run: |
          set +e
          npx -y awesome-lint README.md 2>&1 | tee lint.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          sed -n '1,120p' lint.log >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: comment lint failure
        if: steps.lint.outputs.status != '' && steps.lint.outputs.status != '0'
        uses: actions/github-script@v7
        env:
          FAILURE_LOG: ${{ steps.lint.outputs.log }}
        with:
          script: |
            const log = process.env.FAILURE_LOG || 'No details were captured.';
            const body = [
              'The generated README entry failed awesome-lint checks.',
              '',
              'How to fix it:',
              '- Keep the description concise and meaningful.',
              '- Ensure entry style matches neighboring entries.',
              '- Confirm placement is under the selected category and in alphabetical order.',
              '',
              'Lint details:',
              '```text',
              log,
              '```'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: stop after lint failure
        if: steps.lint.outputs.status != '' && steps.lint.outputs.status != '0'
        run: exit 1

      - name: create pull request
        id: create-pr
        if: steps.lint.outputs.status == '0'
        continue-on-error: true
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: add project submission from issue #${{ github.event.issue.number }}"
          title: ${{ steps.prepare.outputs.pr_title }}
          body: ${{ steps.prepare.outputs.pr_body }}
          branch: ${{ steps.prepare.outputs.branch_name }}
          base: ${{ github.event.repository.default_branch }}
          labels: |
            automated-submission
            ready-to-merge

      - name: comment pull request creation failure
        if: steps.create-pr.conclusion == 'failure' && !steps.create-pr.outputs.pull-request-number
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = `${{ steps.prepare.outputs.branch_name }}`;
            const compareUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/compare/main...${branchName}?expand=1`;

            const body = [
              'I prepared the submission branch, but could not create a pull request automatically.',
              '',
              'Reason: GitHub Actions is currently not permitted to create pull requests in this repository.',
              '',
              'How to fix:',
              '- In repository settings, go to Actions > General > Workflow permissions.',
              '- Enable: Allow GitHub Actions to create and approve pull requests.',
              '',
              `Manual fallback: open a PR from this compare view: ${compareUrl}`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: stop after pull request creation failure
        if: steps.create-pr.conclusion == 'failure' && !steps.create-pr.outputs.pull-request-number
        run: exit 1

      - name: comment with pull request link
        if: steps.create-pr.outputs.pull-request-number && steps.create-pr.outputs.pull-request-operation == 'created'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = `${{ steps.create-pr.outputs.pull-request-number }}`;
            const prUrl = `${{ steps.create-pr.outputs.pull-request-url }}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Thanks for the submission. I created #${prNumber}: ${prUrl}\n\nIt will be auto-merged once all required checks pass.`
            });

      - name: enable auto-merge for created PR
        id: enable-automerge
        if: steps.create-pr.outputs.pull-request-number
        continue-on-error: true
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.create-pr.outputs.pull-request-number }}
          merge-method: merge

      - name: comment auto-merge enablement failure
        if: steps.create-pr.outputs.pull-request-number && steps.enable-automerge.conclusion == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = `${{ steps.create-pr.outputs.pull-request-number }}`;
            const body = [
              `Pull request #${prNumber} was created successfully, but auto-merge could not be enabled.`,
              '',
              'Likely reason: branch protection/required status checks are not configured for `main`.',
              '',
              'How to fix:',
              '- Go to Settings > Branches > Add rule for `main`.',
              '- Enable required status checks (and optionally require pull request before merging).',
              '- Keep repository auto-merge enabled in repository settings.',
              '',
              `After that, enable auto-merge on PR #${prNumber} from the PR page.`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
