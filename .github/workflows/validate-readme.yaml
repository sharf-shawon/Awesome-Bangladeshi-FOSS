name: validate-readme

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-readme:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: run repository validation gate
        run: python scripts/lint_repo.py
