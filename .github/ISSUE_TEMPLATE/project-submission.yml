name: Submit a New Project
description: Propose a project to be added to the Awesome Bangladeshi FOSS list.
title: "[Submission] <Project Name>"
labels:
  - project-submission
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing a project.

        Please fill out all fields carefully. Valid submissions are converted into a pull request automatically.

  - type: input
    id: project_name
    attributes:
      label: Project name
      description: The exact display name for the list entry.
      placeholder: Example Project
    validations:
      required: true

  - type: input
    id: repository_url
    attributes:
      label: Repository URL
      description: Must be a GitHub repository URL.
      placeholder: https://github.com/owner/repo
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Short description
      description: One concise sentence explaining why this project is useful.
      placeholder: Brief, meaningful description of the project.
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Choose the README section where the project should be added.
      options:
        - Web Applications
        - Mobile Apps
        - Developer Tools & Libraries
        - Government & Utility Services
        - Fintech & Payments
        - Other FOSS Projects
        - Awesome Lists & Resource Collections
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Submission checklist
      options:
        - label: This project is genuinely free and open source.
          required: true
        - label: This submission is not a duplicate of an existing README entry.
          required: true
        - label: I used a GitHub repository URL in the format https://github.com/owner/repo.
          required: true
