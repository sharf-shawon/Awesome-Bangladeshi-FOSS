name: Submit a New Project
description: Propose a project to be added to the Awesome Bangladeshi FOSS list.
title: "[Submission]"
labels:
  - project-submission
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing a project.

        Valid submissions are converted into a pull request automatically.
        Project name, stars, owner, and repository description are fetched from GitHub automatically when possible.

  - type: input
    id: repository_url
    attributes:
      label: Repository URL
      description: Must be a GitHub repository URL.
      placeholder: https://github.com/owner/repo
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Custom description (optional)
      description: Optional override if you want a description different from the repository description.
      placeholder: Brief, meaningful description of the project.

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Choose the README section where the project should be added.
      options:
        - Web Applications
        - Mobile Apps
        - Developer Tools & Libraries
        - Government & Utility Services
        - Fintech & Payments
        - Other FOSS Projects
        - Awesome Lists & Resource Collections
    validations:
      required: true

  - type: textarea
    id: reconsideration_notes
    attributes:
      label: Reconsideration notes
      description: Only fill this in if the repository is on the reject list and you want it reviewed anyway.
      placeholder: Explain why this repository should still be considered.
